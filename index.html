<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word of the Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="layout">
    <div class="col-image">
      <img id="word-image" class="word-image" alt="" />
    </div>
    <div class="col-text">
      <div class="topbar">
        <p class="label">Word of the Day</p>
      </div>
      <h1 id="word"></h1>
      <p id="pos" class="pos"></p>
      <p id="definition" class="definition"></p>
      <hr class="divider">
      <div class="etymology">
        <p class="etymology-label">Etymology</p>
        <p id="etymology" class="etymology-text"></p>
      </div>
      <p id="example" class="example"></p>
      <p id="source" class="source"></p>
      <p id="date" class="date"></p>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
